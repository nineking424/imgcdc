version: 2

project_name: imgcdc

before:
  hooks:
    - go mod tidy

builds:
  - id: imgcdc
    main: ./cmd/imgcdc
    binary: imgcdc
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: imgcdc
    ids:
      - imgcdc
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE*
      - README*
      - docs/operating/deployment.md
      - docs/operating/runbook.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*feat(\\(.+\\))?:"
      order: 0
    - title: Fixes
      regexp: "^.*fix(\\(.+\\))?:"
      order: 1
    - title: Build / CI
      regexp: "^.*(build|ci)(\\(.+\\))?:"
      order: 2
    - title: Docs
      regexp: "^.*docs(\\(.+\\))?:"
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: nineking424
    name: imgcdc
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
