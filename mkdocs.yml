site_name: imgcdc
site_description: ETL 처리 로그 polling-tail CDC 데몬
site_url: https://nineking424.github.io/imgcdc/
repo_url: https://github.com/nineking424/imgcdc
repo_name: nineking424/imgcdc

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - go
    - sql
    - yaml
    - bash
  navigation_depth: 3

nav:
  - 홈: index.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Catalog Schema: concepts/catalog-schema.md
  - Operating:
      - Configuration: operating/configuration.md
      - Deployment: operating/deployment.md
      - Runbook: operating/runbook.md
      - Troubleshooting: operating/troubleshooting.md
  - Consumer:
      - Guide: consumer/guide.md
  - Developer:
      - Code Map: developer/code-map.md
      - Testing: developer/testing.md

exclude_docs: |
  superpowers/

markdown_extensions:
  - attr_list
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - fenced_code
  - codehilite
